<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piedra, papel y tijera</title>
    <script>
        function aleatorio (max,min){
            return Math.floor(Math.random()*(max-min+1)+min);
        }

        // 1 sera piedra; 2 sera papel; 3 sera tijera
        let jugador =0;
        let min = 1;
        let max = 3;
        let pc = aleatorio(3,1);

        jugador = prompt("Elige: 1 papel, 2 papel, 3 tijera")

        //alert("Eilge jugada " + jugador)

        if(jugador == 1){
            alert("Elegiste Piedra")
        } else if(jugador ==2){
            alert("Elegiste papel")
        } else if(jugador == 3){
            alert("Elegiste tijera")
        }else{
            alert("Elegiste perder")
        }

        //combate
        
        if(pc == jugador){
            alert("EMPATE")
        }else if(jugador == 1 && pc ==3){
            alert("GANASTE")
        }else if(jugador == 2 && pc == 1){
            alert("GANASTE")
        }else if(jugador == 3 && pc == 2){
            alert("GANASTE")
        }else{
            alert("PERDISTE")
        }
    </script>
</head>
<body>
    <h1>Piedra, Papel y Tijera</h1>
</body>
</html>
