<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA LEYENDA DE AANG: AVATAR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AVATAR: COMBATE ELEMENTAL 🔥💧🌱🌪️</h1>

    <section id="seccion-seleccionar">
        <h2>Elige tu Maestro</h2>
        <div class="contenedor-tarjetas">
    
    <label class="tarjeta-personaje">
        <input type="radio" name="personaje" id="zuko" />
        <div class="info-avatar">
            <img src="./imagenes/image.png" alt="Zuko" class="foto-seleccion">
            <h3>Zuko</h3>
            <p>Maestro Fuego</p>
        </div>
    </label>

    <label class="tarjeta-personaje">
        <input type="radio" name="personaje" id="katara" />
        <div class="info-avatar">
            <img src="./imagenes/Katara.jpg" alt="Katara" class="foto-seleccion">
            <h3>Katara</h3>
            <p>Maestra Agua</p>
        </div>
    </label>

    <label class="tarjeta-personaje">
        <input type="radio" name="personaje" id="aang" />
        <div class="info-avatar">
            <img src="./imagenes/Ang.jpg" alt="Aang" class="foto-seleccion">
            <h3>Aang</h3>
            <p>Avatar (Aire)</p>
        </div>
    </label>

    <label class="tarjeta-personaje">
        <input type="radio" name="personaje" id="toph" />
        <div class="info-avatar">
            <img src="./imagenes/toph.jpg" alt="Toph" class="foto-seleccion">
            <h3>Toph</h3>
            <p>Maestra Tierra</p>
        </div>
    </label>

</div>
</div> <button id="btn-personaje" class="btn-principal">Confirmar Selección</button>
        
    </section>


    <section id="seccion-combate" class="oculto">
        <h2>Arena de Elementos</h2>
        
        <div class="campo-batalla">
            <div id="visual-jugador" class="render-personaje">
                <span id="emoji-jugador" class="sprite"></span>
                <h3 id="nombre-jugador-pantalla">Jugador</h3>
                <div class="barra-vida"><div id="barra-j" class="vida-interior"></div></div>
                <p>Vidas: <span id="vidas-jugador">3</span>/3</p>
            </div>

            <div class="vs">VS</div>

            <div id="visual-enemigo" class="render-personaje">
                <span id="emoji-enemigo" class="sprite"></span>
                <h3 id="nombre-enemigo-pantalla">Enemigo</h3>
                <div class="barra-vida"><div id="barra-e" class="vida-interior"></div></div>
                <p>Vidas: <span id="vidas-enemigo">3</span>/3</p>
            </div>
        </div>

        <div class="botones-ataque">
    <button id="btn-llamas" class="btn-ataque fuego oculto">Llamas de Fuego 🔥</button>
    <button id="btn-explosion" class="btn-ataque fuego oculto">Explosión 💥</button>

    <button id="btn-tsunami" class="btn-ataque agua oculto">Tsunami 🌊</button>
    <button id="btn-tormenta" class="btn-ataque agua oculto">Tormenta ⛈️</button>

    <button id="btn-tornado" class="btn-ataque aire oculto">Tornado 🌪️</button>
    <button id="btn-huracan" class="btn-ataque aire oculto">Huracán 💨</button>

    <button id="btn-terremoto" class="btn-ataque tierra oculto">Terremoto 🌋</button>
    <button id="btn-meteoritos" class="btn-ataque tierra oculto">Meteoritos ☄️</button>
</div>
    </section>

    <section id="seccion-mensajes" class="oculto">
        <div class="consola-combate">
            <p id="texto-resultado">¡La batalla ha comenzado!</p>
        </div>
    </section>

    <section id="seccion-reiniciar" class="oculto">
        <button id="btn-reiniciar" class="btn-principal reiniciar">Volver a Jugar 🔄</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
