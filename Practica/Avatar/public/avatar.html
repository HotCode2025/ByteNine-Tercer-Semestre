<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">        
        <title>LA LEYENDA DE AANG: AVATAR </title>        

    </head>
    <body>
        <h1> AVATAR 🔥💧 🌱 🌪️</h1> <!-- Esto es estático, No cambia, el h1 se utiliza una vez -->

        <section id="selecionar-personaje">



            <label for="zuko">Zuko</label> <!-- Esta etiqueta es para darle un indicador a los usuarios de que están seleccionando -->
            <input type="radio" name="personaje" id="zuko" /> <!-- name es para agrupar todos los inputs y poder seleccionar--> 

            <label for="katara">Katara</label> <!-- El atributo for ayuda a vincular un label con un input a traves del mismo id-->
            <input type="radio" name="personaje" id="katara" /> <!-- Acá van los personajes -->

        <label for="aang">Aang</label>  <!-- Le damos un atributo id para saber cua es el valor de cada uno -->
            <input type="radio" name="personaje" id="aang" />   

            <label for="toph">Toph</label>
            <input type="radio" name="personaje" id="toph" />

            <button id="btn-personaje">Seleccionar</button> <!-- El botón para seleccionar el personaje -->
            
        </section>

        <section id="selecionar-ataque">
                <h2>Elige tu Ataque</h2> <!-- Se puede utilizar varias veces -->
                <p>Tu personaje tiene <span>3</span> vidas </p> <!-- Pero esto debe ser dinamico, necesitamos que cambie-->
                <p>Los personajes del enemigo tienen <span>3</span> vidas </p> <!-- Con la etiqueta spam vamos a modificar el 3 con JS -->

                <p>
                    <button id="boton-fuego">Fuego🔥 </button>
                    <button id="boton-agua">Agua💧 </button>
                    <button id="boton-aire">Aire🌪️ </button>
                    <button id="boton-tierra">Tierra🌱 </button>    
                </p>
    
                <button id="btn-ataque">Atacar</button> <!-- El botón para atacar -->
        </section>

        <section id="mensajes"> <!-- Será un párrafo dinamico-->
            <p> Tu personaje atacó con todo el poder del FUEGO, el personaje del enemigo atacó co el medio poder de la TIERRA - GANASTE 🏆 </p>
        </section>

        <section id="reiniciar">
            <button id="btn-reiniciar">Reiniciar</button> <!-- El botón para reiniciar el juego -->

        <script src="./js/avatar.js"></script> <!-- El script para manejar la lógica del juego --> 
        
    </body>
</html>
